<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Page Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Top Banner -->
    <div class="row mb-4">
        <div class="col-lg-9">
            <div class="bg-info text-white text-center rounded-3 p-3">
                <h1 class="display-4 fw-bold">Welcome</h1>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="row g-3">

        <div class="col-lg-3">
            <div class="bg-danger text-white rounded-4 d-flex justify-content-center align-items-center"
                 style="height:220px;">
                <h2>Menu</h2>
            </div>
        </div>

        <div class="col-lg-3">
            <div class="bg-secondary text-white rounded-4 d-flex justify-content-center align-items-center"
                 style="height:220px;">
                <h2>Gallery</h2>
            </div>
        </div>

        <div class="col-lg-3">
            <div class="bg-success text-white rounded-4 d-flex justify-content-center align-items-center"
                 style="height:220px;">
                <h2>Contact</h2>
            </div>
        </div>

    </div>

    <!-- Bottom Section -->
    <div class="row mt-4">
        <div class="col-lg-9">
            <div class="bg-dark text-white text-center rounded-3 p-3">
                <h3 class="fw-semibold">© 2026 My Website</h3>
            </div>
        </div>
    </div>

</div>

</body>
</html>
