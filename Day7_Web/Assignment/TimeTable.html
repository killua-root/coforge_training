<!DOCTYPE html>
<html>
<head>
    <title>Weekly Class Schedule</title>

<style>
body{
    font-family: Verdana, sans-serif;
    background-color: #f8f8f8;
}

table{
    border-collapse: collapse;
    width: 75%;
    margin: 60px auto;
    background-color: white;
}

table, th, td{
    border: 1px solid black;
}

th, td{
    padding: 12px;
    text-align: center;
}

.heading{
    font-size: 22px;
    background-color: #d9edf7;
}
</style>

</head>
<body>

<table>

    <tr>
        <th colspan="6" class="heading">Weekly Class Schedule</th>
    </tr>

    <tr>
        <th rowspan="6">Period</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
    </tr>

    <tr>
        <td>English</td>
        <td>Physics</td>
        <td>Mathematics</td>
        <td>Chemistry</td>
        <td>Computer</td>
    </tr>

    <tr>
        <td>History</td>
        <td>Biology</td>
        <td>English</td>
        <td>Mathematics</td>
        <td>Sports</td>
    </tr>

    <tr>
        <th colspan="5">BREAK</th>
    </tr>

    <tr>
        <td>Computer</td>
        <td>Physics</td>
        <td>Chemistry</td>
        <td>English</td>
        <td rowspan="2">Lab Session</td>
    </tr>

    <tr>
        <td>Mathematics</td>
        <td>Library</td>
        <td>Biology</td>
        <td>History</td>
    </tr>

</table>

</body>
</html>
