<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>HidenShow</title>
<script type="text/javascript">
function show(){
	document.getElementById("haha").style.display = "block";
}
function hide(){
	document.getElementById("haha").style.display = "none";
}</script>
</head>
<body>
<p id="haha">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit velit esse cillum.</p>
<button onclick="show()">SHOW</button>
<button onclick="hide()">HIDE</button>

</body>
</html>
