<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>DOM Manipulation</title>
<style type="text/css">
.myStyle {
color : yellow;
}</style>
<script>
function createDOM(){
	const myElement = document.createElement("h1");
	myElement.textContent = "DOM Manipulation";
	myElement.setAttribute("id", "MyH1");
	document.body.appendChild(myElement);
}
function updateDOM(){
	const myElement = document.getElementById("MyH1");
	myElement.textContent = "New Text";
}
function addStyle(){
	const myElement = document.getElementById("MyH1");
    myElement.classList.add("myStyle");
}
function removeDOM(){
	const myElement = document.getElementById("MyH1");
	myElement.remove();
}


</script>
</head>
<body>
<button onclick="createDOM()">CreateDOM</button>
<button onclick="updateDOM()">UpdateDOM</button>
<button onclick="addStyle()">AddStyle</button>
<button onclick="removeDOM()">RemoveDOM</button>
</body>
</html>
